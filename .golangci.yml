version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  exclusions:
    generated: lax
    paths:
      - ^docs/
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - ^docs/
