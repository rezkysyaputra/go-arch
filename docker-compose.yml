x-app-environment: &app-environment
  APP_ENV: docker
  LOG_LEVEL: info
  LOG_PRETTY: false
  HTTP_PORT: 8080
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: go_arch
  DB_SSLMODE: disable
  DB_MAX_OPEN_CONNS: 25
  DB_MAX_IDLE_CONNS: 10
  DB_CONN_MAX_LIFETIME: 30m
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  RABBITMQ_EXCHANGE: go_arch.events
  RABBITMQ_USER_CREATED_QUEUE: user.created.queue
  RABBITMQ_USER_CREATED_ROUTING_KEY: user.created
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ""
  REDIS_DB: 0

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/api"]
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/migrate", "up"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_arch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_arch"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
